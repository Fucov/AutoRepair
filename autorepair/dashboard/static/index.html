<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeishuAutoRepair Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-800">🚀 FeishuAutoRepair 自动化修复系统</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="watchdog-status" class="flex items-center space-x-1.5 px-3 py-1.5 rounded-full text-sm cursor-pointer" onclick="toggleWatchdog()" title="点击切换监控">
                        <span id="watchdog-dot" class="w-2.5 h-2.5 rounded-full bg-gray-400"></span>
                        <span id="watchdog-label" class="text-gray-500">监控加载中</span>
                    </div>
                    <div id="poller-status" class="flex items-center space-x-1.5 px-3 py-1.5 rounded-full text-sm cursor-pointer" onclick="togglePoller()" title="点击切换Issue轮询">
                        <span id="poller-dot" class="w-2.5 h-2.5 rounded-full bg-gray-400"></span>
                        <span id="poller-label" class="text-gray-500">轮询加载中</span>
                    </div>
                    <span id="last-updated" class="text-sm text-gray-500">最后更新: 加载中...</span>
                    <button onclick="loadData()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                        刷新数据
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="text-sm text-gray-500 mb-1">总Incident数</div>
                <div class="text-3xl font-bold text-gray-800" id="total-incidents">--</div>
                <div class="text-sm text-green-500 mt-2" id="today-incidents">今日新增: --</div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="text-sm text-gray-500 mb-1">修复成功率</div>
                <div class="text-3xl font-bold text-blue-800" id="repair-success-rate">--%</div>
                <div class="text-sm text-gray-500 mt-2" id="repair-stats">成功: -- / 失败: --</div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="text-sm text-gray-500 mb-1">待处理Issue</div>
                <div class="text-3xl font-bold text-yellow-600" id="open-issues">--</div>
                <div class="text-sm text-gray-500 mt-2">已关闭: <span id="closed-issues">--</span></div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="text-sm text-gray-500 mb-1">待合并PR</div>
                <div class="text-3xl font-bold text-purple-600" id="open-prs">--</div>
                <div class="text-sm text-gray-500 mt-2">已合并: <span id="merged-prs">--</span></div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-3" style="height: 200px;">
                <h3 class="text-sm font-semibold mb-1">24小时Incident趋势</h3>
                <div style="height: 160px;"><canvas id="trend-chart"></canvas></div>
            </div>
            <div class="bg-white rounded-lg shadow p-3" style="height: 200px;">
                <h3 class="text-sm font-semibold mb-1">错误类型分布</h3>
                <div style="height: 160px;"><canvas id="error-type-chart"></canvas></div>
            </div>
        </div>

        <!-- 操作中心 -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h3 class="text-lg font-semibold mb-4">🛠️ 操作中心</h3>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                <button onclick="triggerAction('run_full_pipeline')" class="bg-red-500 hover:bg-red-600 text-white px-4 py-3 rounded-lg font-bold shadow-lg">
                    🚀 一键全流程
                </button>
                <button onclick="triggerAction('scan_logs')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-3 rounded-lg">
                    扫描日志
                </button>
                <button onclick="triggerAction('scan_issues')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-3 rounded-lg">
                    扫描Issue
                </button>
                <button onclick="triggerAction('run_repair')" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-3 rounded-lg">
                    执行修复
                </button>
                <button onclick="triggerAction('sync_prs')" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-3 rounded-lg">
                    同步PR状态
                </button>
                <button onclick="triggerAction('send_digest')" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-3 rounded-lg">
                    发送统计摘要
                </button>
            </div>
            <div id="action-message" class="mt-4 p-3 rounded hidden"></div>
        </div>

        <!-- 待执行修复任务 -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h3 class="text-lg font-semibold mb-4">🔧 待执行修复任务</h3>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b">
                            <th class="text-left py-3 px-4">任务ID</th>
                            <th class="text-left py-3 px-4">事件ID</th>
                            <th class="text-left py-3 px-4">Issue</th>
                            <th class="text-left py-3 px-4">修复计划</th>
                            <th class="text-left py-3 px-4">状态</th>
                            <th class="text-left py-3 px-4">PR链接</th>
                            <th class="text-left py-3 px-4">创建时间</th>
                        </tr>
                    </thead>
                    <tbody id="repair-jobs-table">
                        <tr>
                            <td colspan="6" class="py-4 text-center text-gray-500">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 实时事件流 -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold">⚡ 实时处理事件流</h3>
                <div class="flex items-center space-x-2">
                    <input type="text" id="event-filter-input" placeholder="输入Incident ID或Issue号过滤..." 
                        class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-400"
                        oninput="applyEventFilter()">
                    <button onclick="clearEventFilter()" class="text-sm text-gray-500 hover:text-gray-700 px-2 py-1.5 border border-gray-300 rounded-lg">清除</button>
                </div>
            </div>
            <div class="text-xs text-gray-400 mb-2" id="event-count">共 0 条事件</div>
            <div class="overflow-y-auto max-h-60 bg-gray-50 rounded p-4" id="event-stream">
                <div class="text-gray-500 text-center py-4">等待事件...</div>
            </div>
        </div>

        <!-- 最近Incident列表 -->
        <div class="bg-white rounded-lg shadow p-6">
            <h3 class="text-lg font-semibold mb-4">最近Incident</h3>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b">
                            <th class="text-left py-3 px-4">ID</th>
                            <th class="text-left py-3 px-4">错误类型</th>
                            <th class="text-left py-3 px-4">服务</th>
                            <th class="text-left py-3 px-4">错误文件</th>
                            <th class="text-left py-3 px-4">状态</th>
                            <th class="text-left py-3 px-4">创建时间</th>
                        </tr>
                    </thead>
                    <tbody id="incident-table">
                        <tr>
                            <td colspan="6" class="py-4 text-center text-gray-500">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 全局数据
        let stats = null;
        let incidents = [];
        // 全局Chart实例，用于销毁旧图表
        let trendChart = null;
        let errorTypeChart = null;

        function shortIncidentId(id) {
            if (!id) return '-';
            if (id.startsWith('INC-')) {
                return id;
            }
            return id.length > 16 ? id.slice(-16) : id;
        }

        function shortJobId(id) {
            if (!id) return '-';
            return id.length > 16 ? id.slice(-16) : id;
        }

        // 加载数据
        async function loadData(silent = false) {
            try {
                const statsRes = await fetch('/api/stats');
                stats = await statsRes.json();
                
                document.getElementById('total-incidents').textContent = stats.summary.total_incidents;
                document.getElementById('today-incidents').textContent = `今日新增: ${stats.summary.today_incidents}`;
                document.getElementById('repair-success-rate').textContent = `${stats.summary.repair_success_rate}%`;
                document.getElementById('repair-stats').textContent = `成功: ${stats.summary.successful_repairs} / 失败: ${stats.summary.failed_repairs}`;
                document.getElementById('open-issues').textContent = stats.summary.open_issues;
                document.getElementById('closed-issues').textContent = stats.summary.closed_issues;
                document.getElementById('open-prs').textContent = stats.summary.open_prs;
                document.getElementById('merged-prs').textContent = stats.summary.merged_prs;
                document.getElementById('last-updated').textContent = `最后更新: ${new Date(stats.updated_at).toLocaleString('zh-CN')}`;

                renderTrendChart(stats.trends.last_24h_incidents);
                renderErrorTypeChart(stats.distributions.error_type);

                const incidentsRes = await fetch('/api/incidents?limit=10');
                incidents = await incidentsRes.json();
                renderIncidentTable(incidents);

                const jobsRes = await fetch('/api/repair_jobs?limit=10');
                const jobs = await jobsRes.json();
                renderRepairJobsTable(jobs);

                if (!silent) {
                    showMessage('数据加载成功', 'success');
                }
            } catch (error) {
                if (!silent) {
                    showMessage(`数据加载失败: ${error.message}`, 'error');
                }
            }
        }

        // 渲染趋势图
        function renderTrendChart(data) {
            const ctx = document.getElementById('trend-chart').getContext('2d');
            const labels = Array.from({length: 24}, (_, i) => `${23 - i}h`);
            
            // 销毁旧图表
            if (trendChart) {
                trendChart.destroy();
            }
            
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Incident数量',
                        data: data,
                        borderColor: 'rgb(59, 130, 246)',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointRadius: 2,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { font: { size: 10 } } },
                        y: { ticks: { font: { size: 10 }, stepSize: 1 }, beginAtZero: true }
                    }
                }
            });
        }

        // 渲染错误类型饼图
        function renderErrorTypeChart(data) {
            const ctx = document.getElementById('error-type-chart').getContext('2d');
            const labels = Object.keys(data);
            const values = Object.values(data);
            const colors = [
                'rgb(239, 68, 68)', 'rgb(249, 115, 22)', 'rgb(245, 158, 11)',
                'rgb(234, 179, 8)', 'rgb(132, 204, 22)', 'rgb(34, 197, 94)',
                'rgb(20, 184, 166)', 'rgb(6, 182, 212)', 'rgb(59, 130, 246)',
                'rgb(168, 85, 247)'
            ];

            // 销毁旧图表
            if (errorTypeChart) {
                errorTypeChart.destroy();
            }
            
            errorTypeChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors.slice(0, labels.length)
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { font: { size: 10 }, boxWidth: 12 } } }
                }
            });
        }

        // 渲染Incident表格
        function renderIncidentTable(incidents) {
            const tbody = document.getElementById('incident-table');
            tbody.innerHTML = '';

            if (incidents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="py-4 text-center text-gray-500">暂无Incident记录</td></tr>';
                return;
            }

            incidents.forEach(inc => {
                const row = document.createElement('tr');
                row.className = 'border-b hover:bg-gray-50';
                row.innerHTML = `
                    <td class="py-3 px-4 font-mono text-sm" title="${inc.incident_id}">${shortIncidentId(inc.incident_id)}</td>
                    <td class="py-3 px-4">
                        <span class="bg-red-100 text-red-800 px-2 py-1 rounded text-xs">${inc.error_type}</span>
                    </td>
                    <td class="py-3 px-4">${inc.service || 'unknown'}</td>
                    <td class="py-3 px-4 font-mono text-sm">${inc.suspected_file}:${inc.line_no}</td>
                    <td class="py-3 px-4">
                        <span class="${inc.status === 'open' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'} px-2 py-1 rounded text-xs">${inc.status}</span>
                    </td>
                    <td class="py-3 px-4 text-sm text-gray-500">${new Date(inc.created_at).toLocaleString('zh-CN')}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // 渲染修复任务表格
        function renderRepairJobsTable(jobs) {
            const tbody = document.getElementById('repair-jobs-table');
            tbody.innerHTML = '';

            if (jobs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="py-4 text-center text-gray-500">暂无修复任务</td></tr>';
                return;
            }

            jobs.forEach(job => {
                const row = document.createElement('tr');
                row.className = 'border-b hover:bg-gray-50';
                
                // 状态样式
                let statusClass = '';
                if (job.status === 'queued') {
                    statusClass = 'bg-yellow-100 text-yellow-800';
                } else if (job.status === 'in_progress' || job.status === 'running') {
                    statusClass = 'bg-blue-100 text-blue-800';
                } else if (job.status.includes('fail') || job.status.includes('error')) {
                    statusClass = 'bg-red-100 text-red-800';
                } else {
                    statusClass = 'bg-green-100 text-green-800';
                }

                row.innerHTML = `
                    <td class="py-3 px-4 font-mono text-sm" title="${job.job_id}">${shortJobId(job.job_id)}</td>
                    <td class="py-3 px-4 font-mono text-sm" title="${job.incident_id || ''}">${job.incident_id ? shortIncidentId(job.incident_id) : '-'}</td>
                    <td class="py-3 px-4">
                        ${job.issue_url ? `<a href="${job.issue_url}" target="_blank" class="text-blue-600 hover:underline">#${job.issue_number}</a>` : (job.issue_number ? '#' + job.issue_number : '-')}
                    </td>
                    <td class="py-3 px-4">
                        ${job.report_url ? `<a href="${job.report_url}" target="_blank" class="text-blue-600 hover:underline">查看计划</a>` : '-'}
                    </td>
                    <td class="py-3 px-4">
                        <span class="${statusClass} px-2 py-1 rounded text-xs">${job.status}</span>
                    </td>
                    <td class="py-3 px-4">
                        ${job.pr_url ? `<a href="${job.pr_url}" target="_blank" class="text-blue-600 hover:underline">#${job.pr_number}</a>` : '-'}
                    </td>
                    <td class="py-3 px-4 text-sm text-gray-500">${new Date(job.created_at).toLocaleString('zh-CN')}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // 触发操作
        async function triggerAction(action) {
            try {
                showMessage(`正在执行${action}...`, 'info');
                const res = await fetch(`/api/trigger/${action}`, { method: 'POST' });
                const result = await res.json();
                if (res.ok) {
                    showMessage(result.message, 'success');
                    // 1秒后刷新数据
                    setTimeout(loadData, 1000);
                } else {
                    showMessage(result.detail, 'error');
                }
            } catch (error) {
                showMessage(`操作失败: ${error.message}`, 'error');
            }
        }

        // 显示消息
        function showMessage(message, type) {
            const el = document.getElementById('action-message');
            el.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800', 'bg-blue-100', 'text-blue-800');
            
            if (type === 'success') {
                el.classList.add('bg-green-100', 'text-green-800');
            } else if (type === 'error') {
                el.classList.add('bg-red-100', 'text-red-800');
            } else if (type === 'info') {
                el.classList.add('bg-blue-100', 'text-blue-800');
            }
            
            el.textContent = message;
            el.classList.remove('hidden');
            
            // 3秒后自动隐藏成功/信息消息
            if (type !== 'error') {
                setTimeout(() => el.classList.add('hidden'), 3000);
            }
        }

        // 长轮询实时更新
        let lastEventId = 0;
        
        // 事件类型对应的显示样式和图标
        const eventTypeConfig = {
            'pipeline_started': { icon: '🚀', class: 'text-red-600', message: '全流程开始执行' },
            'pipeline_completed': { icon: '🏁', class: 'text-green-600', message: '全流程执行完成' },
            'pipeline_failed': { icon: '💥', class: 'text-red-600', message: '全流程执行失败' },
            'incident_detected': { icon: '🚨', class: 'text-red-600', message: '检测到新故障' },
            'incident_updated': { icon: '🔄', class: 'text-yellow-600', message: '故障重复出现' },
            'issue_validated': { icon: '🔍', class: 'text-cyan-600', message: 'Issue合理性检查' },
            'issue_created': { icon: '📝', class: 'text-blue-600', message: 'GitHub Issue已创建' },
            'triage_decision': { icon: '🧠', class: 'text-purple-600', message: '分诊决策完成' },
            'diagnostic_report_created': { icon: '📊', class: 'text-purple-600', message: '诊断报告生成完成' },
            'repair_plan_created': { icon: '📋', class: 'text-teal-600', message: '修复计划文档已生成' },
            'repair_job_created': { icon: '📋', class: 'text-yellow-600', message: '修复任务已创建' },
            'repair_started': { icon: '🔧', class: 'text-orange-600', message: '开始执行修复' },
            'repair_context_collected': { icon: '📦', class: 'text-teal-600', message: '修复上下文收集完成' },
            'patch_plan_generated': { icon: '🧩', class: 'text-indigo-600', message: '补丁方案生成完成' },
            'patch_applied': { icon: '📎', class: 'text-blue-500', message: '补丁已应用到代码' },
            'code_committed': { icon: '💾', class: 'text-green-600', message: '代码已提交' },
            'branch_pushed': { icon: '📤', class: 'text-indigo-500', message: '修复分支已推送' },
            'repair_completed': { icon: '✅', class: 'text-green-600', message: '修复完成' },
            'repair_failed': { icon: '❌', class: 'text-red-600', message: '修复失败' },
            'pr_created': { icon: '🔀', class: 'text-indigo-600', message: 'Pull Request已创建' },
            'card_sent': { icon: '💌', class: 'text-pink-600', message: '飞书通知已发送' },
            'logs_scanned': { icon: '📋', class: 'text-green-600', message: '日志扫描完成' },
            'repair_executed': { icon: '🔧', class: 'text-orange-600', message: '修复任务已执行' },
            'prs_synced': { icon: '🔄', class: 'text-blue-600', message: 'PR状态已同步' },
            'digest_sent': { icon: '📰', class: 'text-purple-600', message: '统计摘要已发送' },
            'watchdog_started': { icon: '👁️', class: 'text-green-600', message: '文件监控已启动' },
            'watchdog_stopped': { icon: '👁️‍🗨️', class: 'text-yellow-600', message: '文件监控已停止' },
            'error': { icon: '❌', class: 'text-red-600', message: '处理出错' },
            'issue_polled': { icon: '🔍', class: 'text-cyan-600', message: 'Issue自动轮询' },
            'auto_repair_triggered': { icon: '⚙️', class: 'text-orange-600', message: '自动触发修复' },
            'auto_repair_finished': { icon: '🏁', class: 'text-green-600', message: '自动修复完成' },
            'initial_scan_started': { icon: '🔍', class: 'text-blue-600', message: '启动时初始扫描开始' },
            'initial_scan_finished': { icon: '✅', class: 'text-green-600', message: '启动时初始扫描完成' },
            'pipeline_started': { icon: '🚀', class: 'text-red-600', message: '全流程开始执行' },
            'pipeline_completed': { icon: '🏁', class: 'text-green-600', message: '全流程执行完成' },
            'pipeline_failed': { icon: '💥', class: 'text-red-600', message: '全流程执行失败' },
            'repair_executed': { icon: '🔧', class: 'text-orange-600', message: '修复任务已执行' },
            'all_repairs_executed': { icon: '📦', class: 'text-purple-600', message: '批量修复完成' },
            'prs_synced': { icon: '🔗', class: 'text-blue-600', message: 'PR状态同步完成' },
            'logs_scanned': { icon: '📋', class: 'text-green-600', message: '日志扫描完成' },
            'issues_scanned': { icon: '📋', class: 'text-blue-600', message: 'Issue扫描完成' },
            'digest_sent': { icon: '📊', class: 'text-purple-600', message: '统计摘要已发送' }
        };
        
        // 添加事件到事件流
        function addEventToStream(event) {
            const eventStream = document.getElementById('event-stream');
            // 移除初始提示
            if (eventStream.querySelector('.text-gray-500.text-center')) {
                eventStream.innerHTML = '';
            }
            
            const config = eventTypeConfig[event.type] || { icon: 'ℹ️', class: 'text-gray-600', message: event.type };
            const eventEl = document.createElement('div');
            eventEl.className = 'mb-2 p-2 rounded bg-white border-l-4 border-blue-200 hover:bg-gray-50 transition-colors';
            
            let detail = '';
            if (event.data) {
                if (event.data.incident_id) {
                    detail += `事件ID: ${shortIncidentId(event.data.incident_id)} `;
                    eventEl.setAttribute('data-incident-id', event.data.incident_id);
                }
                if (event.data.issue_number) {
                    detail += `Issue: #${event.data.issue_number} `;
                    eventEl.setAttribute('data-issue-number', String(event.data.issue_number));
                }
                if (event.data.job_id) {
                    detail += `任务ID: ${shortJobId(event.data.job_id)} `;
                }
                if (event.data.message) {
                    detail += event.data.message;
                }
            }
            
            eventEl.innerHTML = `
                <span class="font-mono text-xs text-gray-500">${new Date(event.timestamp).toLocaleTimeString('zh-CN')}</span>
                <span class="ml-2">${config.icon}</span>
                <span class="ml-1 font-medium ${config.class}">${config.message}</span>
                ${detail ? `<span class="ml-2 text-sm text-gray-600">${detail}</span>` : ''}
            `;
            
            eventStream.insertBefore(eventEl, eventStream.firstChild);
            
            if (eventStream.children.length > 50) {
                eventStream.removeChild(eventStream.lastChild);
            }

            applyEventFilter();
            updateEventCount();
        }

        function applyEventFilter() {
            const filterInput = document.getElementById('event-filter-input');
            const keyword = (filterInput.value || '').trim().toLowerCase();
            const eventStream = document.getElementById('event-stream');
            const items = eventStream.querySelectorAll('[data-incident-id], [data-issue-number]');

            eventStream.querySelectorAll('div[class*="mb-2"]').forEach(el => {
                if (!keyword) {
                    el.style.display = '';
                    return;
                }
                const incId = (el.getAttribute('data-incident-id') || '').toLowerCase();
                const issueNum = (el.getAttribute('data-issue-number') || '').toLowerCase();
                const text = el.textContent.toLowerCase();
                if (incId.includes(keyword) || issueNum.includes(keyword) || text.includes(keyword)) {
                    el.style.display = '';
                } else {
                    el.style.display = 'none';
                }
            });
            updateEventCount();
        }

        function clearEventFilter() {
            document.getElementById('event-filter-input').value = '';
            applyEventFilter();
        }

        function updateEventCount() {
            const eventStream = document.getElementById('event-stream');
            const allItems = eventStream.querySelectorAll('div[class*="mb-2"]');
            const visibleItems = [...allItems].filter(el => el.style.display !== 'none');
            const countEl = document.getElementById('event-count');
            const keyword = document.getElementById('event-filter-input').value.trim();
            if (countEl) {
                countEl.textContent = keyword ? `显示 ${visibleItems.length} / 共 ${allItems.length} 条事件` : `共 ${allItems.length} 条事件`;
            }
        }
        
        async function startLongPoll() {
            try {
                const res = await fetch(`/api/events/long-poll?last_event_id=${lastEventId}`);
                const data = await res.json();
                
                if (data.events && data.events.length > 0) {
                    const refreshTriggers = new Set([
                        'pipeline_completed', 'pipeline_failed', 'auto_repair_finished',
                        'incident_detected', 'incident_updated', 'issue_created',
                        'repair_job_created', 'repair_completed', 'repair_failed',
                        'pr_created', 'initial_scan_finished', 'auto_repair_triggered',
                        'card_sent', 'diagnostic_report_created', 'repair_plan_created',
                        'repair_executed', 'all_repairs_executed'
                    ]);
                    let shouldRefresh = false;
                    data.events.forEach(event => {
                        addEventToStream(event);
                        if (event.type === 'watchdog_started' || event.type === 'watchdog_stopped') {
                            pollWatchdogStatus();
                        }
                        if (refreshTriggers.has(event.type)) {
                            shouldRefresh = true;
                        }
                    });
                    if (shouldRefresh) {
                        loadData(true);
                    }
                    lastEventId = data.last_event_id;
                }
                
                startLongPoll();
            } catch (error) {
                setTimeout(startLongPoll, 3000);
            }
        }

        async function pollWatchdogStatus() {
            try {
                const res = await fetch('/api/watchdog/status');
                const data = await res.json();
                const dot = document.getElementById('watchdog-dot');
                const label = document.getElementById('watchdog-label');
                if (data.running) {
                    dot.className = 'w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse';
                    label.textContent = '自动监控中';
                    label.className = 'text-green-700';
                } else {
                    dot.className = 'w-2.5 h-2.5 rounded-full bg-red-400';
                    label.textContent = '监控已停止';
                    label.className = 'text-red-600';
                }
            } catch (e) {
                const dot = document.getElementById('watchdog-dot');
                const label = document.getElementById('watchdog-label');
                dot.className = 'w-2.5 h-2.5 rounded-full bg-gray-400';
                label.textContent = '连接失败';
                label.className = 'text-gray-500';
            }
        }

        let watchdogRunning = false;
        let pollerRunning = false;

        async function pollPollerStatus() {
            try {
                const res = await fetch('/api/poller/status');
                const data = await res.json();
                const dot = document.getElementById('poller-dot');
                const label = document.getElementById('poller-label');
                pollerRunning = data.running;
                if (data.running) {
                    dot.className = 'w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse';
                    label.textContent = `Issue轮询中 (${data.interval_seconds}s)`;
                    label.className = 'text-green-700';
                } else {
                    dot.className = 'w-2.5 h-2.5 rounded-full bg-gray-400';
                    label.textContent = 'Issue轮询已停止';
                    label.className = 'text-gray-500';
                }
            } catch (e) {
                const dot = document.getElementById('poller-dot');
                const label = document.getElementById('poller-label');
                dot.className = 'w-2.5 h-2.5 rounded-full bg-gray-400';
                label.textContent = '连接失败';
                label.className = 'text-gray-500';
            }
        }

        async function toggleWatchdog() {
            try {
                const statusRes = await fetch('/api/watchdog/status');
                const statusData = await statusRes.json();
                const endpoint = statusData.running ? '/api/watchdog/stop' : '/api/watchdog/start';
                const res = await fetch(endpoint, { method: 'POST' });
                const result = await res.json();
                showMessage(result.message, res.ok ? 'success' : 'error');
                setTimeout(pollWatchdogStatus, 500);
            } catch (e) {
                showMessage(`操作失败: ${e.message}`, 'error');
            }
        }

        async function togglePoller() {
            try {
                const statusRes = await fetch('/api/poller/status');
                const statusData = await statusRes.json();
                const endpoint = statusData.running ? '/api/poller/stop' : '/api/poller/start';
                const res = await fetch(endpoint, { method: 'POST' });
                const result = await res.json();
                showMessage(result.message, res.ok ? 'success' : 'error');
                setTimeout(pollPollerStatus, 500);
            } catch (e) {
                showMessage(`操作失败: ${e.message}`, 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            pollWatchdogStatus();
            pollPollerStatus();
            setInterval(pollWatchdogStatus, 10000);
            setInterval(pollPollerStatus, 10000);
            startLongPoll();
        });
    </script>
</body>
</html>
